<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>피치 버드</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;600&family=Noto+Sans+KR:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{width:100%;overflow:hidden;background:#0a0a2a}
body{font-family:'Noto Sans KR',sans-serif;min-height:100vh;color:#fff}
.header{background:rgba(255,255,255,.06);backdrop-filter:blur(10px);padding:2rem 1.2rem 1rem;text-align:center;position:relative;border-bottom:1px solid rgba(255,255,255,.08)}
.back{position:absolute;left:.9rem;top:.9rem;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.15);border-radius:20px;padding:6px 14px;font-size:12px;color:rgba(255,255,255,.8);text-decoration:none;display:inline-flex;align-items:center;min-height:36px}
.header-title{font-family:'Noto Serif KR',serif;font-size:1.3rem;color:#fff;margin-bottom:.1rem}
.header-sub{font-size:11px;color:rgba(255,255,255,.4)}

/* 닉네임 */
#screen-nick{padding:1.5rem 1rem;max-width:380px;margin:0 auto}
.nick-card{background:rgba(255,255,255,.07);border-radius:22px;padding:1.8rem 1.5rem;border:1.5px solid rgba(255,255,255,.1);text-align:center}
.nick-emoji{font-size:56px;margin-bottom:.6rem;display:block}
.nick-title{font-family:'Noto Serif KR',serif;font-size:18px;color:#fff;margin-bottom:.3rem}
.nick-sub{font-size:12px;color:rgba(255,255,255,.4);margin-bottom:1.2rem;line-height:1.8}
.nick-field{width:100%;border:1.5px solid rgba(255,255,255,.15);border-radius:12px;padding:11px 14px;font-family:'Noto Sans KR',sans-serif;font-size:15px;color:#fff;background:rgba(255,255,255,.08);outline:none;text-align:center;margin-bottom:.8rem;-webkit-appearance:none}
.nick-field::placeholder{color:rgba(255,255,255,.25)}
.nick-field:focus{border-color:rgba(155,89,182,.5)}
.char-select{display:flex;gap:8px;justify-content:center;margin-bottom:1rem;flex-wrap:wrap}
.char-btn{width:48px;height:48px;border-radius:14px;border:2px solid rgba(255,255,255,.1);background:rgba(255,255,255,.06);font-size:24px;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center}
.char-btn:active{transform:scale(.9)}
.char-btn.selected{border-color:#e91e8c;background:rgba(233,30,140,.2);transform:scale(1.1)}
.start-btn{width:100%;background:linear-gradient(135deg,#9b59b6,#e91e8c);color:#fff;border:none;border-radius:12px;padding:13px;font-family:'Noto Sans KR',sans-serif;font-size:14px;font-weight:500;cursor:pointer;min-height:48px}

/* 게임 화면 */
#screen-game{display:none}
.game-wrap{position:relative;width:100%;height:calc(100vh - 80px)}
#game-canvas{width:100%;height:100%;display:block;cursor:pointer;touch-action:none}

/* HUD */
.hud{position:absolute;top:10px;left:0;right:0;display:flex;justify-content:space-between;align-items:center;padding:0 14px;pointer-events:none}
.hud-score{font-family:'Noto Serif KR',serif;font-size:22px;color:#fff;text-shadow:0 0 10px rgba(255,255,255,.5)}
.hud-best{font-size:11px;color:rgba(255,255,255,.4)}
.hud-pitch{display:flex;align-items:center;gap:6px}
.pitch-bar-wrap{width:80px;height:8px;background:rgba(255,255,255,.1);border-radius:4px;overflow:hidden}
.pitch-bar-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,#6BCB77,#e91e8c);transition:width .05s}
.pitch-label{font-size:10px;color:rgba(255,255,255,.5)}

/* 마이크 버튼 */
.mic-btn{position:absolute;bottom:20px;left:50%;transform:translateX(-50%);width:64px;height:64px;border-radius:50%;background:linear-gradient(135deg,#9b59b6,#e91e8c);border:none;font-size:28px;cursor:pointer;box-shadow:0 4px 20px rgba(155,89,182,.5);display:flex;align-items:center;justify-content:center;transition:all .2s}
.mic-btn.active{background:linear-gradient(135deg,#e91e8c,#FF5722);box-shadow:0 4px 30px rgba(233,30,140,.7);animation:micPulse 1s infinite}
@keyframes micPulse{0%,100%{transform:translateX(-50%) scale(1)}50%{transform:translateX(-50%) scale(1.1)}}

/* 오버레이 */
.overlay{position:absolute;inset:0;background:rgba(0,0,0,.75);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;backdrop-filter:blur(4px)}
.overlay-emoji{font-size:60px}
.overlay-title{font-family:'Noto Serif KR',serif;font-size:26px;color:#fff}
.overlay-score{font-size:42px;font-weight:700;color:#e91e8c;font-family:'Noto Serif KR',serif}
.overlay-sub{font-size:13px;color:rgba(255,255,255,.5)}
.overlay-btn{background:linear-gradient(135deg,#9b59b6,#e91e8c);color:#fff;border:none;border-radius:14px;padding:13px 32px;font-family:'Noto Sans KR',sans-serif;font-size:15px;font-weight:600;cursor:pointer;min-height:48px}
.overlay-hint{font-size:12px;color:rgba(255,255,255,.4);text-align:center;line-height:1.7}
</style>
</head>
<body>

<div class="header">
  <a class="back" href="index.html">← 돌아가기</a>
  <div class="header-title">🎵 피치 버드</div>
  <div class="header-sub">목소리로 새를 조종해요!</div>
</div>

<!-- 닉네임 -->
<div id="screen-nick">
  <div style="height:.5rem"></div>
  <div class="nick-card">
    <span class="nick-emoji">🐦</span>
    <div class="nick-title">피치 버드</div>
    <div class="nick-sub">마이크에 소리를 내면<br>높은 소리 → 새가 올라가요 ↑<br>낮은 소리 → 새가 내려가요 ↓<br>파이프 사이를 통과해봐요!</div>
    <input class="nick-field" id="nick-input" type="text" placeholder="이름을 입력해요" maxlength="10" onkeydown="if(event.key==='Enter')enterGame()">
    <div style="font-size:11px;color:rgba(255,255,255,.4);margin-bottom:.6rem">캐릭터 선택</div>
    <div class="char-select">
      <button class="char-btn selected" onclick="selectChar('🐦',this)">🐦</button>
      <button class="char-btn" onclick="selectChar('🦜',this)">🦜</button>
      <button class="char-btn" onclick="selectChar('🦋',this)">🦋</button>
      <button class="char-btn" onclick="selectChar('🚀',this)">🚀</button>
      <button class="char-btn" onclick="selectChar('⭐',this)">⭐</button>
      <button class="char-btn" onclick="selectChar('🎵',this)">🎵</button>
    </div>
    <button class="start-btn" onclick="enterGame()">🎵 게임 시작!</button>
  </div>
</div>

<!-- 게임 -->
<div id="screen-game">
  <div class="game-wrap">
    <canvas id="game-canvas"></canvas>
    <div class="hud">
      <div>
        <div class="hud-score" id="hud-score">0</div>
        <div class="hud-best" id="hud-best">최고: 0</div>
      </div>
      <div class="hud-pitch">
        <div class="pitch-label">피치</div>
        <div class="pitch-bar-wrap">
          <div class="pitch-bar-fill" id="pitch-bar" style="width:50%"></div>
        </div>
      </div>
    </div>
    <button class="mic-btn" id="mic-btn" onclick="toggleMic()">🎤</button>
  </div>
</div>

<script>
const CHARS={
  '🐦':{color:'#FFD93D',trail:'rgba(255,217,61,.3)'},
  '🦜':{color:'#6BCB77',trail:'rgba(107,203,119,.3)'},
  '🦋':{color:'#C77DFF',trail:'rgba(199,125,255,.3)'},
  '🚀':{color:'#4D96FF',trail:'rgba(77,150,255,.3)'},
  '⭐':{color:'#FFD700',trail:'rgba(255,215,0,.3)'},
  '🎵':{color:'#e91e8c',trail:'rgba(233,30,140,.3)'},
};

let myNickname='',myChar='🐦';
let audioCtx=null,analyser=null,micStream=null;
let micActive=false;
let pitchLevel=0.5; // 0~1
let canvas,ctx;
let gameState='ready'; // ready|playing|dead
let score=0,bestScore=0;
let frameId=null;

// 새
let bird={x:0,y:0,vy:0,trail:[]};

// 파이프
let pipes=[];
let pipeTimer=0;
const PIPE_INTERVAL=120;
const PIPE_GAP=160;
const PIPE_WIDTH=60;
const PIPE_SPEED=3;

// 배경 별
let stars=[];

function selectChar(c,el){
  myChar=c;
  document.querySelectorAll('.char-btn').forEach(b=>b.classList.remove('selected'));
  el.classList.add('selected');
}

function enterGame(){
  const nick=document.getElementById('nick-input').value.trim()||'익명';
  myNickname=nick;
  document.getElementById('screen-nick').style.display='none';
  document.getElementById('screen-game').style.display='block';
  initGame();
}

function initGame(){
  canvas=document.getElementById('game-canvas');
  ctx=canvas.getContext('2d');
  resizeCanvas();
  window.addEventListener('resize',resizeCanvas);
  initStars();
  resetGame();
  gameLoop();
}

function resizeCanvas(){
  const wrap=canvas.parentElement;
  canvas.width=wrap.offsetWidth;
  canvas.height=wrap.offsetHeight;
}

function initStars(){
  stars=[];
  for(let i=0;i<60;i++)stars.push({x:Math.random()*2000,y:Math.random()*600,r:.5+Math.random()*1.5,speed:.2+Math.random()*.5,opacity:.3+Math.random()*.7});
}

function resetGame(){
  bird={x:canvas.width*.25,y:canvas.height/2,vy:0,trail:[]};
  pipes=[];pipeTimer=0;score=0;
  document.getElementById('hud-score').textContent='0';
  gameState='ready';
  showOverlay('ready');
}

function showOverlay(type){
  // 캔버스에 오버레이 그리기
}

/* ── 마이크 ── */
async function toggleMic(){
  if(micActive){stopMic();return;}
  try{
    micStream=await navigator.mediaDevices.getUserMedia({audio:true,video:false});
    audioCtx=new(window.AudioContext||window.webkitAudioContext)();
    analyser=audioCtx.createAnalyser();
    analyser.fftSize=512;analyser.smoothingTimeConstant=0.6;
    const src=audioCtx.createMediaStreamSource(micStream);
    src.connect(analyser);
    micActive=true;
    document.getElementById('mic-btn').classList.add('active');
    document.getElementById('mic-btn').textContent='⏹';
    if(gameState==='ready')startGame();
    pitchLoop();
  }catch(e){alert('마이크 권한이 필요해요!');}
}

function stopMic(){
  if(micStream)micStream.getTracks().forEach(t=>t.stop());
  micActive=false;
  document.getElementById('mic-btn').classList.remove('active');
  document.getElementById('mic-btn').textContent='🎤';
  pitchLevel=0.5;
}

function pitchLoop(){
  if(!micActive)return;
  requestAnimationFrame(pitchLoop);
  if(!analyser)return;
  const buf=new Uint8Array(analyser.frequencyBinCount);
  analyser.getByteFrequencyData(buf);
  // 음성 주파수 범위 (80~1000Hz) 평균
  const sr=audioCtx.sampleRate;
  const fftSize=analyser.fftSize;
  const lowBin=Math.floor(80*fftSize/sr);
  const highBin=Math.floor(1000*fftSize/sr);
  let sum=0,count=0;
  // 가중치: 높은 주파수 빈일수록 높은 피치
  let weightedSum=0,totalWeight=0;
  for(let i=lowBin;i<Math.min(highBin,buf.length);i++){
    if(buf[i]>20){
      const weight=(i-lowBin)/(highBin-lowBin);
      weightedSum+=weight*buf[i];totalWeight+=buf[i];sum+=buf[i];count++;
    }
  }
  if(totalWeight>0&&sum>500){
    // 가중 평균 주파수 비율 → 피치레벨
    const rawPitch=weightedSum/totalWeight;
    pitchLevel=pitchLevel*.7+rawPitch*.3;
  }else{
    // 소리 없으면 서서히 중간으로
    pitchLevel=pitchLevel*.95+0.5*.05;
  }
  document.getElementById('pitch-bar').style.width=(pitchLevel*100)+'%';
}

/* ── 게임 시작 ── */
function startGame(){
  gameState='playing';
  bird={x:canvas.width*.22,y:canvas.height/2,vy:0,trail:[]};
  pipes=[];pipeTimer=0;score=0;
  document.getElementById('hud-score').textContent='0';
}

/* ── 게임 루프 ── */
function gameLoop(){
  frameId=requestAnimationFrame(gameLoop);
  update();
  draw();
}

function update(){
  if(gameState!=='playing')return;

  // 새 물리
  const targetY=canvas.height*(1-pitchLevel);
  const dy=targetY-bird.y;
  bird.vy=bird.vy*.7+dy*.06;
  bird.y+=bird.vy;
  bird.y=Math.max(20,Math.min(canvas.height-20,bird.y));

  // 트레일
  bird.trail.push({x:bird.x,y:bird.y});
  if(bird.trail.length>15)bird.trail.shift();

  // 파이프 생성
  pipeTimer++;
  if(pipeTimer>=PIPE_INTERVAL){
    pipeTimer=0;
    const minTop=80,maxTop=canvas.height-PIPE_GAP-80;
    const topH=minTop+Math.random()*(maxTop-minTop);
    pipes.push({x:canvas.width+10,topH,passed:false});
  }

  // 파이프 이동
  for(let i=pipes.length-1;i>=0;i--){
    pipes[i].x-=PIPE_SPEED;
    // 통과 체크
    if(!pipes[i].passed&&pipes[i].x+PIPE_WIDTH<bird.x){
      pipes[i].passed=true;
      score++;
      document.getElementById('hud-score').textContent=score;
      if(score>bestScore){bestScore=score;document.getElementById('hud-best').textContent='최고: '+bestScore;}
    }
    // 화면 밖 제거
    if(pipes[i].x+PIPE_WIDTH<0)pipes.splice(i,1);
  }

  // 충돌
  if(checkCollision()){
    gameState='dead';
    stopMic();
    if(score>bestScore)bestScore=score;
  }
}

function checkCollision(){
  const bx=bird.x,by=bird.y,br=16;
  // 천장/바닥
  if(by-br<0||by+br>canvas.height)return true;
  // 파이프
  for(const p of pipes){
    if(bx+br>p.x&&bx-br<p.x+PIPE_WIDTH){
      if(by-br<p.topH||by+br>p.topH+PIPE_GAP)return true;
    }
  }
  return false;
}

/* ── 그리기 ── */
function draw(){
  const w=canvas.width,h=canvas.height;
  // 배경
  const grad=ctx.createLinearGradient(0,0,0,h);
  grad.addColorStop(0,'#0a0a2a');grad.addColorStop(1,'#1a0a3a');
  ctx.fillStyle=grad;ctx.fillRect(0,0,w,h);

  // 별
  stars.forEach(s=>{
    s.x-=s.speed;if(s.x<0)s.x=w+10;
    ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
    ctx.fillStyle=`rgba(255,255,255,${s.opacity})`;ctx.fill();
  });

  // 파이프
  pipes.forEach(p=>{
    const grad1=ctx.createLinearGradient(p.x,0,p.x+PIPE_WIDTH,0);
    grad1.addColorStop(0,'#9b59b6');grad1.addColorStop(1,'#6c3483');
    ctx.fillStyle=grad1;
    // 위 파이프
    ctx.beginPath();ctx.roundRect(p.x,0,PIPE_WIDTH,p.topH,8);ctx.fill();
    // 파이프 테두리
    ctx.strokeStyle='rgba(255,255,255,.15)';ctx.lineWidth=2;
    ctx.beginPath();ctx.roundRect(p.x,0,PIPE_WIDTH,p.topH,8);ctx.stroke();
    // 아래 파이프
    const botY=p.topH+PIPE_GAP;
    ctx.fillStyle=grad1;
    ctx.beginPath();ctx.roundRect(p.x,botY,PIPE_WIDTH,h-botY,8);ctx.fill();
    ctx.beginPath();ctx.roundRect(p.x,botY,PIPE_WIDTH,h-botY,8);ctx.stroke();
    // 파이프 입구 강조
    ctx.fillStyle='rgba(155,89,182,.5)';
    ctx.beginPath();ctx.roundRect(p.x-4,p.topH-16,PIPE_WIDTH+8,16,6);ctx.fill();
    ctx.beginPath();ctx.roundRect(p.x-4,botY,PIPE_WIDTH+8,16,6);ctx.fill();
  });

  // 피치 가이드 라인
  const targetY=canvas.height*(1-pitchLevel);
  ctx.setLineDash([6,6]);
  ctx.strokeStyle='rgba(233,30,140,.25)';ctx.lineWidth=1.5;
  ctx.beginPath();ctx.moveTo(0,targetY);ctx.lineTo(w,targetY);ctx.stroke();
  ctx.setLineDash([]);

  // 트레일
  const charData=CHARS[myChar]||CHARS['🐦'];
  bird.trail.forEach((t,i)=>{
    const alpha=(i/bird.trail.length)*.4;
    ctx.beginPath();ctx.arc(t.x,t.y,8*(i/bird.trail.length),0,Math.PI*2);
    ctx.fillStyle=charData.trail.replace('.3',alpha.toFixed(2));ctx.fill();
  });

  // 새
  ctx.font='28px serif';ctx.textAlign='center';ctx.textBaseline='middle';
  // 기울기
  ctx.save();
  ctx.translate(bird.x,bird.y);
  const angle=Math.max(-0.5,Math.min(0.5,bird.vy*0.04));
  ctx.rotate(angle);
  ctx.fillText(myChar,0,0);
  ctx.restore();

  // 죽었을 때 오버레이
  if(gameState==='dead'){
    ctx.fillStyle='rgba(0,0,0,.7)';ctx.fillRect(0,0,w,h);
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.font='60px serif';ctx.fillText('💥',w/2,h/2-80);
    ctx.font=`bold 28px 'Noto Serif KR',serif`;ctx.fillStyle='#fff';
    ctx.fillText('게임 오버!',w/2,h/2-20);
    ctx.font=`bold 56px 'Noto Serif KR',serif`;ctx.fillStyle='#e91e8c';
    ctx.fillText(score,w/2,h/2+50);
    ctx.font=`14px 'Noto Sans KR',sans-serif`;ctx.fillStyle='rgba(255,255,255,.6)';
    ctx.fillText('점수',w/2,h/2+90);
    if(score>=bestScore&&score>0){
      ctx.font=`16px 'Noto Sans KR',sans-serif`;ctx.fillStyle='#FFD700';
      ctx.fillText('🏆 최고 기록!',w/2,h/2+120);
    }
    ctx.font=`13px 'Noto Sans KR',sans-serif`;ctx.fillStyle='rgba(255,255,255,.4)';
    ctx.fillText('마이크 버튼을 눌러 다시 시작해요',w/2,h-40);
  }

  // 준비 화면
  if(gameState==='ready'){
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.font='60px serif';ctx.fillText(myChar,w*.22,h/2);
    ctx.font=`bold 20px 'Noto Serif KR',serif`;ctx.fillStyle='#fff';
    ctx.fillText('마이크 버튼을 눌러 시작!',w/2,h*.7);
    ctx.font=`12px 'Noto Sans KR',sans-serif`;ctx.fillStyle='rgba(255,255,255,.4)';
    ctx.fillText('높은 소리 → 위로  |  낮은 소리 → 아래로',w/2,h*.78);
  }

  // 피치 레벨 세로 바
  const barH=100,barW=8;
  const barX=w-20,barY=(h-barH)/2;
  ctx.fillStyle='rgba(255,255,255,.1)';
  ctx.beginPath();ctx.roundRect(barX,barY,barW,barH,4);ctx.fill();
  const fillH=barH*pitchLevel;
  const pitchGrad=ctx.createLinearGradient(0,barY+barH,0,barY);
  pitchGrad.addColorStop(0,'#6BCB77');pitchGrad.addColorStop(.5,'#FFD93D');pitchGrad.addColorStop(1,'#e91e8c');
  ctx.fillStyle=pitchGrad;
  ctx.beginPath();ctx.roundRect(barX,barY+barH-fillH,barW,fillH,4);ctx.fill();
  // 현재 위치 표시
  ctx.beginPath();ctx.arc(barX+barW/2,barY+barH-fillH,6,0,Math.PI*2);
  ctx.fillStyle='#fff';ctx.fill();
}

/* ── 마이크 버튼 재시작 ── */
document.addEventListener('DOMContentLoaded',()=>{
  document.getElementById('mic-btn').addEventListener('click',async()=>{
    if(gameState==='dead'){
      await toggleMic();
      if(micActive)startGame();
      return;
    }
    toggleMic();
  });
});

function toggleMic(){
  if(micActive){stopMic();return Promise.resolve();}
  return (async()=>{
    try{
      micStream=await navigator.mediaDevices.getUserMedia({audio:true,video:false});
      audioCtx=new(window.AudioContext||window.webkitAudioContext)();
      analyser=audioCtx.createAnalyser();
      analyser.fftSize=512;analyser.smoothingTimeConstant=0.6;
      const src=audioCtx.createMediaStreamSource(micStream);
      src.connect(analyser);
      micActive=true;
      document.getElementById('mic-btn').classList.add('active');
      document.getElementById('mic-btn').textContent='⏹';
      if(gameState==='ready')startGame();
      pitchLoop();
    }catch(e){alert('마이크 권한이 필요해요!');}
  })();
}
</script>
</body>
</html>
