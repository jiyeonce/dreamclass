<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>함께 그리는 노래</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;600&family=Noto+Sans+KR:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{width:100%;overflow-x:hidden}
:root{--cream:#FFF8F0;--peach:#FFE4CC;--pink:#C97B7B;--pink-light:#E8A89A;--teal:#5B9B8E;--text-dark:#3D2B1F;--text-mid:#6B4E3D;--text-light:#A08070;}
body{font-family:'Noto Sans KR',sans-serif;background:var(--cream);color:var(--text-dark);min-height:100vh}
.header{background:linear-gradient(135deg,#FFE4CC 0%,#FFD6E8 100%);padding:2.5rem 1.2rem 1.2rem;text-align:center;position:relative}
.back{position:absolute;left:.9rem;top:.9rem;background:rgba(255,255,255,.65);border:1px solid rgba(200,160,140,.3);border-radius:20px;padding:6px 14px;font-size:12px;color:var(--text-mid);text-decoration:none;display:inline-flex;align-items:center;min-height:36px}
.header-title{font-family:'Noto Serif KR',serif;font-size:1.4rem;color:var(--text-dark);margin-bottom:.2rem}
.header-sub{font-size:11px;color:var(--text-light)}
#screen-nick{padding:2rem 1rem;max-width:400px;margin:0 auto}
.nick-card{background:#fff;border-radius:22px;padding:2rem 1.5rem;border:1.5px solid rgba(200,160,140,.15);text-align:center}
.nick-emoji{font-size:44px;margin-bottom:.8rem}
.nick-title{font-family:'Noto Serif KR',serif;font-size:18px;color:var(--text-dark);margin-bottom:.3rem}
.nick-sub{font-size:12px;color:var(--text-light);margin-bottom:1.2rem;line-height:1.8}
.nick-field{width:100%;border:1.5px solid rgba(200,160,140,.25);border-radius:12px;padding:12px 14px;font-family:'Noto Sans KR',sans-serif;font-size:15px;color:var(--text-dark);background:var(--cream);outline:none;text-align:center;margin-bottom:.8rem;-webkit-appearance:none}
.nick-field:focus{border-color:rgba(201,123,123,.5)}
.nick-btn{width:100%;background:linear-gradient(135deg,var(--pink),var(--pink-light));color:#fff;border:none;border-radius:12px;padding:13px;font-family:'Noto Sans KR',sans-serif;font-size:14px;font-weight:500;cursor:pointer;min-height:48px}
#screen-main{display:none;padding:1rem;max-width:480px;margin:0 auto;padding-bottom:120px}
.online-box{background:#fff;border-radius:14px;padding:.8rem;border:1.5px solid rgba(200,160,140,.15);margin-bottom:.8rem;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.online-dot{width:8px;height:8px;border-radius:50%;background:#6BCB77;flex-shrink:0;animation:blink 2s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.4}}
.online-name{font-size:12px;font-weight:500;color:var(--text-dark)}
.online-me{color:var(--teal)}
.legend{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:.8rem;background:#fff;border-radius:14px;padding:.8rem;border:1.5px solid rgba(200,160,140,.15)}
.legend-item{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text-mid)}
.legend-dot{width:14px;height:14px;border-radius:50%;flex-shrink:0}
.legend-hint{font-size:10px;color:var(--text-light);width:100%;margin-top:4px}
.canvas-wrap{border-radius:18px;overflow:hidden;border:2px solid rgba(200,160,140,.2);margin-bottom:.8rem;position:relative}
.canvas-tools{display:flex;gap:6px;padding:8px 10px;background:linear-gradient(135deg,#FFF5F0,#FFF8FC);border-bottom:1px solid rgba(200,160,140,.15);flex-wrap:wrap;align-items:center}
.color-btn{width:28px;height:28px;border-radius:50%;border:2px solid transparent;cursor:pointer;flex-shrink:0;transition:transform .15s}
.color-btn.active{border-color:var(--text-dark);transform:scale(1.2)}
.tool-btn{padding:4px 10px;border-radius:8px;border:1.5px solid rgba(200,160,140,.2);background:#fff;font-size:11px;font-weight:500;cursor:pointer;color:var(--pink);font-family:'Noto Sans KR',sans-serif}
.tool-btn.active{background:#FFF0E8;border-color:var(--pink)}
canvas{display:block;touch-action:none;width:100%;height:auto;background:#FFFDF8;border-radius:0 0 16px 16px}
.note-guide{position:absolute;right:0;top:36px;bottom:0;width:28px;display:flex;flex-direction:column;justify-content:space-between;padding:4px 2px;pointer-events:none;background:rgba(255,255,255,.7)}
.note-label{font-size:8px;color:var(--text-light);text-align:center;font-weight:500}
/* 커서 표시 */
.remote-cursor{position:absolute;pointer-events:none;transition:left .05s,top .05s;z-index:10}
.remote-cursor-dot{width:12px;height:12px;border-radius:50%;border:2px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,.3)}
.remote-cursor-name{font-size:9px;font-weight:600;color:#fff;background:rgba(0,0,0,.5);border-radius:6px;padding:1px 5px;margin-top:2px;white-space:nowrap}
.stamp-btn{width:100%;background:linear-gradient(135deg,#FFD93D,#FFA500);color:#7a4a00;border:none;border-radius:12px;padding:12px;font-family:'Noto Sans KR',sans-serif;font-size:13px;font-weight:600;cursor:pointer;min-height:44px;margin-bottom:.6rem}
.stamp-btn:active{transform:scale(.97)}
.controls{display:flex;gap:8px;margin-bottom:1rem}
.ctrl-btn{flex:1;border:none;border-radius:12px;padding:12px;font-family:'Noto Sans KR',sans-serif;font-size:13px;font-weight:500;cursor:pointer;min-height:44px}
.ctrl-btn:active{transform:scale(.97)}
.play-btn{background:linear-gradient(135deg,#6BCB77,#4D96FF);color:#fff}
.play-btn.playing{background:linear-gradient(135deg,#FF8080,#FFB347);animation:pulse 1s infinite}
.clear-btn{background:#fff;border:1.5px solid rgba(200,160,140,.3)!important;color:var(--text-mid);max-width:60px}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.75}}
.stamps-box{background:#fff;border-radius:18px;padding:1rem;border:1.5px solid rgba(200,160,140,.15);margin-bottom:1rem}
.stamps-label{font-size:10px;letter-spacing:2px;color:var(--text-light);margin-bottom:.8rem;text-transform:uppercase}
.stamp-item{display:inline-flex;align-items:center;gap:5px;border-radius:20px;padding:5px 12px;font-size:12px;font-weight:500;margin:3px;color:#fff}
</style>
</head>
<body>
<div class="header">
  <a class="back" href="index.html">← 돌아가기</a>
  <div class="header-title">🎨 함께 그리는 노래</div>
  <div class="header-sub">다 같이 그리면 음악이 돼요!</div>
</div>

<div id="screen-nick">
  <div style="height:.5rem"></div>
  <div class="nick-card">
    <div class="nick-emoji">🎨</div>
    <div class="nick-title">함께 그리는 노래</div>
    <div class="nick-sub">같은 캔버스에 다같이 그려요!<br>색깔이 악기, 높이가 음이 돼요 🎵<br>이름표를 찍어 내 그림을 남겨요</div>
    <input class="nick-field" id="nick-input" type="text" placeholder="이름을 입력해요" maxlength="10" onkeydown="if(event.key==='Enter')enterMain()">
    <button class="nick-btn" onclick="enterMain()">🎨 시작하기</button>
  </div>
</div>

<div id="screen-main">
  <div class="online-box" id="online-box">
    <div class="online-dot"></div>
    <span style="font-size:11px;color:var(--text-light)">지금 함께:</span>
    <div id="online-names"></div>
  </div>
  <div class="legend">
    <div class="legend-item"><div class="legend-dot" style="background:#E05555"></div>피아노</div>
    <div class="legend-item"><div class="legend-dot" style="background:#4D96FF"></div>실로폰</div>
    <div class="legend-item"><div class="legend-dot" style="background:#6BCB77"></div>기타</div>
    <div class="legend-item"><div class="legend-dot" style="background:#C77DFF"></div>플루트</div>
    <div class="legend-item"><div class="legend-dot" style="background:#FFD93D"></div>트럼펫</div>
    <div class="legend-hint">↑ 위로 그릴수록 높은 음 · 아래로 그릴수록 낮은 음</div>
  </div>
  <div class="canvas-wrap" id="canvas-wrap">
    <div class="canvas-tools">
      <div class="color-btn active" style="background:#E05555" onclick="setColor('#E05555',this)"></div>
      <div class="color-btn" style="background:#4D96FF" onclick="setColor('#4D96FF',this)"></div>
      <div class="color-btn" style="background:#6BCB77" onclick="setColor('#6BCB77',this)"></div>
      <div class="color-btn" style="background:#C77DFF" onclick="setColor('#C77DFF',this)"></div>
      <div class="color-btn" style="background:#FFD93D" onclick="setColor('#FFD93D',this)"></div>
      <button class="tool-btn active" id="pen-btn" onclick="setTool('pen')">펜</button>
      <button class="tool-btn" id="eraser-btn" onclick="setTool('eraser')">지우개</button>
      <input type="range" min="3" max="18" value="6" oninput="brushSize=+this.value" style="flex:1;min-width:40px;max-width:70px">
    </div>
    <canvas id="draw-canvas"></canvas>
    <div class="note-guide">
      <div class="note-label">시</div>
      <div class="note-label">라</div>
      <div class="note-label">솔</div>
      <div class="note-label">파</div>
      <div class="note-label">미</div>
      <div class="note-label">레</div>
      <div class="note-label">도</div>
    </div>
  </div>
  <div class="controls">
    <button class="ctrl-btn play-btn" id="play-btn" onclick="togglePlay()">▶ 음악으로 재생</button>
    <button class="ctrl-btn clear-btn" onclick="confirmClear()">🗑</button>
  </div>
  <div class="stamps-box">
    <div class="stamps-label">🏷️ 함께 그린 친구들</div>
    <div id="stamps-list"><span style="font-size:12px;color:var(--text-light)">아직 이름표가 없어요</span></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL='https://aoywuhpqivpczstoogcm.supabase.co';
const SUPABASE_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFveXd1aHBxaXZwY3pzdG9vZ2NtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkzNzc4MDQsImV4cCI6MjA5NDk1MzgwNH0.UgxYDvQpTZA_g2wuvwh6QyS4cogKnCkG3FjG9IRd_Cw';
const sb=supabase.createClient(SUPABASE_URL,SUPABASE_KEY);

const NOTES=[261.63,293.66,329.63,349.23,392.00,440.00,493.88];
const NAME_COLORS=['#E05555','#4D96FF','#6BCB77','#C77DFF','#FFD93D','#FF8C69','#5B9B8E'];

let myNickname='';
let tool='pen',color='#E05555',brushSize=6,isDrawing=false;
let audioCtx=null,isPlaying=false,playTimeout=null;
let broadcastChannel=null;
let remoteCursors={};
let lastBroadcast=0;

function getAudioCtx(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();return audioCtx;}

function enterMain(){
  const nick=document.getElementById('nick-input').value.trim();
  if(!nick){alert('이름을 입력해줘요!');return;}
  myNickname=nick;
  document.getElementById('screen-nick').style.display='none';
  document.getElementById('screen-main').style.display='block';
  initCanvas();
  loadCanvas();
  loadStamps();
  setupBroadcast();
  registerOnline();
  setInterval(registerOnline,15000);
  setInterval(loadOnline,8000);
}

/* ── 캔버스 ── */
let canvasInited=false;
function initCanvas(){
  if(canvasInited)return;canvasInited=true;
  const canvas=document.getElementById('draw-canvas');
  const ctx=canvas.getContext('2d');
  function resize(){
    const w=canvas.parentElement.clientWidth;
    const oldW=canvas.width,oldH=canvas.height;
    let imgData=null;
    if(oldW>0&&oldH>0){try{imgData=ctx.getImageData(0,0,oldW,oldH);}catch(e){}}
    canvas.width=w;canvas.height=Math.round(w*.65);
    ctx.fillStyle='#FFFDF8';ctx.fillRect(0,0,canvas.width,canvas.height);
    if(imgData)ctx.putImageData(imgData,0,0);
  }
  resize();

  function pos(e){
    const r=canvas.getBoundingClientRect();
    const src=e.touches?e.touches[0]:e;
    return{
      x:(src.clientX-r.left)*(canvas.width/r.width),
      y:(src.clientY-r.top)*(canvas.height/r.height),
      nx:(src.clientX-r.left)/r.width,
      ny:(src.clientY-r.top)/r.height
    };
  }

  let strokePoints=[];
  let lastPoint=null;

  canvas.addEventListener('mousedown',e=>{
    isDrawing=true;strokePoints=[];
    const p=pos(e);ctx.beginPath();ctx.moveTo(p.x,p.y);
    lastPoint=p;strokePoints.push({x:p.nx,y:p.ny});
    broadcastDraw('start',p);
  });
  canvas.addEventListener('mousemove',e=>{
    if(!isDrawing)return;
    const p=pos(e);
    drawSegment(ctx,lastPoint,p);
    lastPoint=p;strokePoints.push({x:p.nx,y:p.ny});
    broadcastDraw('move',p);
  });
  canvas.addEventListener('mouseup',()=>{if(isDrawing){isDrawing=false;saveStroke(strokePoints);stampAutoOnCanvas(ctx,strokePoints,canvas.width,canvas.height);broadcastDraw('end',null);}});
  canvas.addEventListener('mouseleave',()=>{if(isDrawing){isDrawing=false;saveStroke(strokePoints);stampAutoOnCanvas(ctx,strokePoints,canvas.width,canvas.height);broadcastDraw('end',null);}});

  canvas.addEventListener('touchstart',e=>{
    e.preventDefault();isDrawing=true;strokePoints=[];
    const p=pos(e);ctx.beginPath();ctx.moveTo(p.x,p.y);
    lastPoint=p;strokePoints.push({x:p.nx,y:p.ny});
    broadcastDraw('start',p);
  },{passive:false});
  canvas.addEventListener('touchmove',e=>{
    e.preventDefault();if(!isDrawing)return;
    const p=pos(e);
    drawSegment(ctx,lastPoint,p);
    lastPoint=p;strokePoints.push({x:p.nx,y:p.ny});
    broadcastDraw('move',p);
  },{passive:false});
  canvas.addEventListener('touchend',()=>{if(isDrawing){isDrawing=false;saveStroke(strokePoints);stampAutoOnCanvas(ctx,strokePoints,canvas.width,canvas.height);broadcastDraw('end',null);}});
}

function drawSegment(ctx,from,to){
  if(!from||!to)return;
  ctx.beginPath();ctx.moveTo(from.x,from.y);ctx.lineTo(to.x,to.y);
  if(tool==='eraser'){
    ctx.globalCompositeOperation='destination-out';
    ctx.strokeStyle='rgba(0,0,0,1)';
    ctx.lineWidth=brushSize*3;
  }else{
    ctx.globalCompositeOperation='source-over';
    ctx.strokeStyle=color;
    ctx.lineWidth=brushSize;
  }
  ctx.lineCap='round';ctx.lineJoin='round';ctx.stroke();
  ctx.globalCompositeOperation='source-over';
}

function setColor(c,el){color=c;document.querySelectorAll('.color-btn').forEach(d=>d.classList.remove('active'));el.classList.add('active');if(tool==='eraser')setTool('pen');}
function setTool(t){tool=t;document.getElementById('pen-btn').classList.toggle('active',t==='pen');document.getElementById('eraser-btn').classList.toggle('active',t==='eraser');}

/* ── Broadcast 실시간 ── */
function setupBroadcast(){
  broadcastChannel=sb.channel('draw-realtime',{config:{broadcast:{self:false}}});

  broadcastChannel
    .on('broadcast',{event:'draw'},(payload)=>{
      const{nickname,action,nx,ny,color:c,brushSize:bs,tool:t}=payload.payload;
      handleRemoteDraw(nickname,action,nx,ny,c,bs,t);
    })
    .on('broadcast',{event:'cursor'},(payload)=>{
      const{nickname,nx,ny}=payload.payload;
      updateRemoteCursor(nickname,nx,ny);
    })
    .on('broadcast',{event:'stamp'},(payload)=>{
      const{bx,by,tw,text,tagColor}=payload.payload;
      const canvas=document.getElementById('draw-canvas');
      const ctx=canvas.getContext('2d');
      const w=canvas.width,h=canvas.height;
      const padding=4;
      ctx.font='bold 11px Noto Sans KR, sans-serif';
      ctx.fillStyle=tagColor;
      ctx.beginPath();
      ctx.roundRect(bx*w,by*h,tw*w+padding*2,18,4);
      ctx.fill();
      ctx.fillStyle='#fff';
      ctx.fillText(text,bx*w+padding,by*h+13);
      loadStamps();
    })
    .subscribe();
}

// 원격 드로잉 상태
const remoteDrawState={};

function handleRemoteDraw(nickname,action,nx,ny,c,bs,t){
  const canvas=document.getElementById('draw-canvas');
  const ctx=canvas.getContext('2d');
  const w=canvas.width,h=canvas.height;
  const x=nx*w,y=ny*h;

  if(!remoteDrawState[nickname])remoteDrawState[nickname]={lastPoint:null};
  const state=remoteDrawState[nickname];

  if(action==='start'){
    state.lastPoint={x,y};state.color=c;state.brushSize=bs;state.tool=t;
  }else if(action==='move'&&state.lastPoint){
    ctx.beginPath();ctx.moveTo(state.lastPoint.x,state.lastPoint.y);ctx.lineTo(x,y);
    if(t==='eraser'){
      ctx.globalCompositeOperation='destination-out';
      ctx.strokeStyle='rgba(0,0,0,1)';
      ctx.lineWidth=bs*3;
    }else{
      ctx.globalCompositeOperation='source-over';
      ctx.strokeStyle=c;
      ctx.lineWidth=bs;
    }
    ctx.lineCap='round';ctx.lineJoin='round';ctx.stroke();
    ctx.globalCompositeOperation='source-over';
    state.lastPoint={x,y};
    updateRemoteCursor(nickname,nx,ny);
  }else if(action==='end'){
    state.lastPoint=null;
    hideRemoteCursor(nickname);
  }
}

function broadcastDraw(action,p){
  if(!broadcastChannel)return;
  const now=Date.now();
  if(action==='move'&&now-lastBroadcast<30)return; // 30ms 쓰로틀
  lastBroadcast=now;
  broadcastChannel.send({type:'broadcast',event:'draw',payload:{
    nickname:myNickname,action,
    nx:p?p.nx:null,ny:p?p.ny:null,
    color,brushSize,tool
  }});
}

/* ── 원격 커서 ── */
function updateRemoteCursor(nickname,nx,ny){
  const wrap=document.getElementById('canvas-wrap');
  const canvas=document.getElementById('draw-canvas');
  const rect=canvas.getBoundingClientRect();
  let cursor=document.getElementById('cursor-'+nickname);
  if(!cursor){
    cursor=document.createElement('div');
    cursor.className='remote-cursor';
    cursor.id='cursor-'+nickname;
    const names=[...Object.keys(remoteCursors),nickname];
    const colorIdx=names.indexOf(nickname)%NAME_COLORS.length;
    cursor.innerHTML=`<div class="remote-cursor-dot" style="background:${NAME_COLORS[colorIdx]}"></div><div class="remote-cursor-name" style="background:${NAME_COLORS[colorIdx]}">${nickname}</div>`;
    wrap.appendChild(cursor);
  }
  remoteCursors[nickname]=true;
  const x=nx*canvas.offsetWidth;
  const y=ny*canvas.offsetHeight+36; // 툴바 높이
  cursor.style.left=x+'px';cursor.style.top=y+'px';cursor.style.display='block';
}

function hideRemoteCursor(nickname){
  const cursor=document.getElementById('cursor-'+nickname);
  if(cursor)cursor.style.display='none';
  setTimeout(()=>{if(cursor)cursor.style.display='none';},500);
}

/* ── DB 저장/불러오기 ── */
async function saveStroke(points){
  if(!points.length)return;
  await sb.from('shared_canvas').insert([{
    nickname:myNickname,
    color:tool==='eraser'?'eraser':color,
    brush_size:brushSize,
    points:JSON.stringify(points)
  }]);
}

async function loadCanvas(){
  const{data}=await sb.from('shared_canvas').select('*').order('created_at',{ascending:true});
  if(!data)return;
  const canvas=document.getElementById('draw-canvas');
  const ctx=canvas.getContext('2d');
  ctx.fillStyle='#FFFDF8';ctx.fillRect(0,0,canvas.width,canvas.height);
  data.forEach(s=>{
    const points=JSON.parse(s.points);
    if(!points.length)return;
    const w=canvas.width,h=canvas.height;
    ctx.beginPath();
    ctx.moveTo(points[0].x*w,points[0].y*h);
    for(let i=1;i<points.length;i++)ctx.lineTo(points[i].x*w,points[i].y*h);
    ctx.strokeStyle=s.color==='eraser'?'#FFFDF8':s.color;
    ctx.lineWidth=s.color==='eraser'?s.brush_size*3:s.brush_size;
    ctx.lineCap='round';ctx.lineJoin='round';ctx.stroke();
  });
}

function stampAutoOnCanvas(ctx,points,w,h){
  if(!points.length)return;
  // 마지막 점 근처에 이름표 찍기
  const last=points[points.length-1];
  const x=last.x*w;
  const y=last.y*h;
  const nameColors={'#E05555':'#E05555','#4D96FF':'#4D96FF','#6BCB77':'#6BCB77','#C77DFF':'#C77DFF','#FFD93D':'#DAA520'};
  const tagColor=tool==='eraser'?'#aaa':(nameColors[color]||color);
  // 배경 박스
  const padding=4;
  const text=myNickname;
  ctx.font='bold 11px Noto Sans KR, sans-serif';
  const tw=ctx.measureText(text).width;
  const bx=Math.min(x+4,w-tw-padding*2-4);
  const by=Math.max(y-20,4);
  ctx.fillStyle=tagColor;
  ctx.beginPath();
  ctx.roundRect(bx,by,tw+padding*2,18,4);
  ctx.fill();
  ctx.fillStyle='#fff';
  ctx.fillText(text,bx+padding,by+13);
  // 이름표도 DB에 저장
  sb.from('canvas_stamps').insert([{nickname:myNickname}]);
  loadStamps();
  // 이름표 스트로크도 broadcast
  broadcastStamp(bx,by,tw,text,tagColor,w,h);
}

function broadcastStamp(bx,by,tw,text,tagColor,w,h){
  if(!broadcastChannel)return;
  broadcastChannel.send({type:'broadcast',event:'stamp',payload:{
    nickname:myNickname,bx:bx/w,by:by/h,tw:tw/w,text,tagColor
  }});
}

async function loadStamps(){
  const{data}=await sb.from('canvas_stamps').select('*').order('created_at',{ascending:true});
  if(!data)return;
  const el=document.getElementById('stamps-list');
  if(!data.length){el.innerHTML='<span style="font-size:12px;color:var(--text-light)">아직 이름표가 없어요</span>';return;}
  const names=[...new Set(data.map(s=>s.nickname))];
  el.innerHTML=data.map(s=>{
    const colorIdx=names.indexOf(s.nickname)%NAME_COLORS.length;
    const time=new Date(s.created_at).toLocaleDateString('ko-KR',{month:'numeric',day:'numeric'});
    return `<span class="stamp-item" style="background:${NAME_COLORS[colorIdx]}">${s.nickname} <span style="opacity:.7;font-size:10px">${time}</span></span>`;
  }).join('');
}

/* ── 음악 재생 ── */
function canvasToNotes(){
  const canvas=document.getElementById('draw-canvas');
  const ctx=canvas.getContext('2d');
  const w=canvas.width,h=canvas.height;
  const data=ctx.getImageData(0,0,w,h).data;
  const COLS=32;const slotW=w/COLS;const notes=[];
  for(let col=0;col<COLS;col++){
    const x0=Math.floor(col*slotW),x1=Math.floor((col+1)*slotW);
    const pixels=[];
    for(let x=x0;x<x1;x++){
      for(let y=0;y<h;y++){
        const i=(y*w+x)*4;
        const r=data[i],g=data[i+1],b=data[i+2],a=data[i+3];
        if(a>50&&!(r>250&&g>250&&b>240))pixels.push({y,r,g,b});
      }
    }
    if(pixels.length>0){
      const avgY=pixels.reduce((s,p)=>s+p.y,0)/pixels.length;
      const noteIdx=Math.floor((1-avgY/h)*NOTES.length);
      const freq=NOTES[Math.max(0,Math.min(NOTES.length-1,noteIdx))];
      const avgR=pixels.reduce((s,p)=>s+p.r,0)/pixels.length;
      const avgG=pixels.reduce((s,p)=>s+p.g,0)/pixels.length;
      const avgB=pixels.reduce((s,p)=>s+p.b,0)/pixels.length;
      notes.push({freq,instrument:getInstrument(avgR,avgG,avgB),vol:Math.min(pixels.length/50,1)});
    }else{notes.push(null);}
  }
  return notes;
}

function getInstrument(r,g,b){
  const colors={piano:{r:224,g:85,b:85},xylophone:{r:77,g:150,b:255},guitar:{r:107,g:203,b:119},flute:{r:199,g:125,b:255},trumpet:{r:255,g:217,b:61}};
  let best='piano',bestDist=Infinity;
  for(const[name,c]of Object.entries(colors)){const d=Math.sqrt((r-c.r)**2+(g-c.g)**2+(b-c.b)**2);if(d<bestDist){bestDist=d;best=name;}}
  return best;
}

function playNote(freq,instrument,vol,duration,ctx){
  const osc=ctx.createOscillator();const gain=ctx.createGain();
  osc.connect(gain);gain.connect(ctx.destination);
  const waveforms={piano:'triangle',xylophone:'sine',guitar:'sawtooth',flute:'sine',trumpet:'square'};
  osc.type=waveforms[instrument]||'sine';osc.frequency.value=freq;
  gain.gain.setValueAtTime(0,ctx.currentTime);
  gain.gain.linearRampToValueAtTime(vol*.4,ctx.currentTime+.02);
  gain.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+duration*.9);
  osc.start(ctx.currentTime);osc.stop(ctx.currentTime+duration);
}

function togglePlay(){
  if(isPlaying){
    isPlaying=false;if(playTimeout)clearTimeout(playTimeout);
    document.getElementById('play-btn').textContent='▶ 음악으로 재생';
    document.getElementById('play-btn').classList.remove('playing');return;
  }
  const notes=canvasToNotes();
  if(!notes.some(n=>n!==null)){alert('먼저 그림을 그려줘요! 🎨');return;}
  isPlaying=true;
  document.getElementById('play-btn').textContent='⏹ 멈추기';
  document.getElementById('play-btn').classList.add('playing');
  const ctx=getAudioCtx();
  const BPM=120,beatDur=60/BPM/2;
  let i=0;
  function step(){
    if(!isPlaying||i>=notes.length){
      isPlaying=false;document.getElementById('play-btn').textContent='▶ 음악으로 재생';
      document.getElementById('play-btn').classList.remove('playing');return;
    }
    if(notes[i])playNote(notes[i].freq,notes[i].instrument,notes[i].vol,beatDur*1.2,ctx);
    i++;playTimeout=setTimeout(step,beatDur*1000);
  }
  step();
}

async function confirmClear(){
  if(!confirm('캔버스를 초기화할까요? 모두에게 적용돼요!'))return;
  await sb.from('shared_canvas').delete().neq('id',0);
  await sb.from('canvas_stamps').delete().neq('id',0);
  loadCanvas();loadStamps();
}

/* ── 온라인 참여자 ── */
async function registerOnline(){
  await sb.from('online_users').upsert([{nickname:myNickname,last_seen:new Date().toISOString()}],{onConflict:'nickname'});
  loadOnline();
}

async function loadOnline(){
  const since=new Date(Date.now()-30000).toISOString();
  const{data}=await sb.from('online_users').select('nickname').gte('last_seen',since);
  if(!data)return;
  const el=document.getElementById('online-names');
  el.innerHTML=data.map(u=>`<span class="online-name${u.nickname===myNickname?' online-me':''}">${u.nickname}${u.nickname===myNickname?' (나)':''}</span>`).join('<span style="color:var(--text-light);margin:0 4px">·</span>');
}
